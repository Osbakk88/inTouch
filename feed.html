<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inTouch | Feed</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <img
        src="./logo/FullLogo_Transparent_NoBuffer (6).png"
        alt="inTouch logo"
        class="site-logo"
      />
      <nav class="site-nav">
        <a href="./index.html">Home</a>
        <a href="./feed.html">Feed</a>
        <a href="./profile.html">Profile</a>
        <a href="./login.html">Login</a>
        <a href="./register.html">Register</a>
      </nav>
    </header>
    <main class="container">
      <h1>Feed</h1>
      <input type="text" id="search-input" placeholder="Search posts..." />
      <form id="create-post-form">
        <label for="post-title">Title</label>
        <input id="post-title" name="title" type="text" required />
        <label for="post-body">Body</label>
        <textarea id="post-body" name="body" rows="4" required></textarea>
        <button type="submit">Create post</button>
        <p id="post-error" class="error"></p>
      </form>
      <section id="feed-list"></section>
    </main>
    <script type="module" src="./src/pages/feedPage.js"></script>
  </body>
</html>
